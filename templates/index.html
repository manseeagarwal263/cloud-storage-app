<!DOCTYPE html>
<html>
<head>
    <title>CloudStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f4ff; }
        .navbar { background: #4A90E2; padding: 15px 30px; color: white; font-size: 22px; font-weight: bold; }
        .hero { text-align: center; padding: 100px 20px; }
        .hero h1 { font-size: 48px; color: #333; margin-bottom: 20px; }
        .hero p { font-size: 20px; color: #666; margin-bottom: 40px; }
        .btn { padding: 15px 40px; margin: 10px; border-radius: 8px; font-size: 18px; text-decoration: none; display: inline-block; }
        .btn-primary { background: #4A90E2; color: white; }
        .btn-secondary { background: white; color: #4A90E2; border: 2px solid #4A90E2; }
    </style>
</head>
<body>
    <div class="navbar">☁️ CloudStore</div>
    <div class="hero">
        <h1>Your Files, In the Cloud</h1>
        <p>Upload, store and access your files from anywhere</p>
        <a href="/register" class="btn btn-primary">Get Started</a>
        <a href="/login" class="btn btn-secondary">Login</a>
    </div>
</body>
</html>
